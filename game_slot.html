<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 幸運小瑪莉 (精準打擊版)</title>
    
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 15px; background-image: radial-gradient(circle at 50% 50%, #222 0%, #000 100%); min-height: 100vh; }
        h2 { color: #f1c40f; text-shadow: 0 0 20px #f1c40f; margin-top: 5px; font-size: 26px; letter-spacing: 2px;}
        .container { width: 100%; max-width: 380px; background: #222; padding: 20px; border-radius: 10px; border: 2px solid #444; box-sizing: border-box; text-align: center; margin-bottom: 20px;}
        .btn { background: #3498db; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; transition: 0.2s;}
        .btn:hover { filter: brightness(1.2); } .btn:disabled { background:#555; color:#888; cursor:not-allowed;}
        .input-box { width: 100%; padding: 12px; font-size: 16px; text-align: center; border-radius: 5px; border: 2px solid #00ffcc; background: #111; color: white; box-sizing: border-box; margin-bottom: 10px; outline:none;}
        
        #lobby-screen, #game-screen { display: none; }
        .active-screen { display: flex !important; flex-direction: column; align-items: center; width: 100%;}

        .info-board { display: flex; justify-content: space-between; width: 100%; max-width: 380px; background: #111; padding: 10px; border-radius: 10px; border: 2px solid #333; box-sizing: border-box; margin-bottom: 10px; align-items: center;}
        .score-box { font-size: 16px; font-weight: 900; color: #fff; display: flex; flex-direction: column; align-items: center;}
        .score-box span { color: #f1c40f; font-size: 20px;}
        
        #room-status { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 10px; text-shadow: 0 0 10px #fff; text-align: center;}

        .machine-container { position: relative; width: 100%; max-width: 380px; background: #222; padding: 15px; border-radius: 15px; border: 4px solid #555; box-shadow: inset 0 0 20px #000, 0 0 30px rgba(241, 196, 15, 0.2); box-sizing: border-box; }
        .grid-board { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 8px; }
        .cell { background: #1a1a1a; border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; height: 60px; font-size: 14px; font-weight: bold; color: #888; text-align: center; word-break: break-word; transition: 0.1s; }
        .cell-0 { grid-column: 1; grid-row: 1; } .cell-1 { grid-column: 2; grid-row: 1; } .cell-2 { grid-column: 3; grid-row: 1; } .cell-3 { grid-column: 4; grid-row: 1; } .cell-4 { grid-column: 4; grid-row: 2; } .cell-5 { grid-column: 4; grid-row: 3; } .cell-6 { grid-column: 4; grid-row: 4; } .cell-7 { grid-column: 3; grid-row: 4; } .cell-8 { grid-column: 2; grid-row: 4; } .cell-9 { grid-column: 1; grid-row: 4; } .cell-10 { grid-column: 1; grid-row: 3; } .cell-11 { grid-column: 1; grid-row: 2; }

        .active-light { background: #e74c3c !important; color: white !important; border-color: #ff7675 !important; box-shadow: 0 0 20px #e74c3c !important; transform: scale(1.05); z-index: 10; }
        @keyframes jackpot-flash { 0%, 100% { background: #f1c40f; box-shadow: 0 0 30px #f1c40f; } 50% { background: #e67e22; box-shadow: 0 0 10px #e67e22; } }
        .jackpot { animation: jackpot-flash 0.3s infinite !important; color: #000 !important; border-color: #fff !important;}

        .center-control { grid-column: 2 / 4; grid-row: 2 / 4; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #spin-btn { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #e74c3c, #c0392b); border: 4px solid #fff; color: white; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 0 #8e0000; transition: 0.1s; outline: none; }
        #spin-btn:active:not(:disabled) { transform: translateY(10px); box-shadow: 0 0 0 #8e0000; }
        #spin-btn:disabled { background: radial-gradient(circle, #7f8c8d, #34495e); box-shadow: 0 10px 0 #2c3e50; cursor: not-allowed; color:#aaa;}

        #quiz-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 100; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .quiz-box { background: #222; border: 4px solid #f1c40f; padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; }
        .quiz-word { font-size: 36px; color: #f1c40f; font-weight: 900; margin-bottom: 20px;}
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .quiz-btn { background: #34495e; color: white; padding: 15px 5px; font-size: 16px; border: 2px solid #2c3e50; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .quiz-btn.correct { background: #27ae60 !important; border-color: #2ecc71 !important;} .quiz-btn.wrong { background: #c0392b !important; border-color: #e74c3c !important;}
        #menu-btn { margin-top: 15px; background: #555; padding: 10px 20px; border-radius: 5px; text-decoration: none; color: white; border: 2px solid #777;}
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

    <h2>🎰 幸運小瑪莉</h2>

    <div id="lobby-screen" class="container active-screen">
        <h3 id="lobby-title">載入題庫中...</h3>
        <div id="lobby-actions" style="display:none; width: 100%;">
            
            <div style="display:flex; gap:5px; margin-bottom:10px; width:100%;">
                <select id="sel-main-level" class="input-box" style="flex:1; background:#e67e22; border:none; color:white; padding:10px;">
                    <option value="ALL">🌟 全冊題庫</option>
                    <option value="1A">國一上 (1A)</option>
                    <option value="1B">國一下 (1B)</option>
                    <option value="2A">國二上 (2A)</option>
                    <option value="2B">國二下 (2B)</option>
                    <option value="3A">國三上 (3A)</option>
                    <option value="3B">國三下 (3B)</option>
                </select>
                <select id="sel-sub-level" class="input-box" style="flex:1; background:#d35400; border:none; color:white; padding:10px;">
                    <option value="ALL">📂 所有細項</option>
                </select>
            </div>

            <select id="select-rounds" class="input-box" style="background: #2c3e50;">
                <option value="5">進行 5 回合</option>
                <option value="10">進行 10 回合</option>
            </select>
            
            <button id="btn-single-play" class="btn" style="background:#8e44ad;">👤 單人練習模式 (本機)</button>
            <hr style="border-color:#444; margin: 15px 0;">
            <button id="btn-create-room" class="btn" style="background:#27ae60;">🏠 建立對戰房間 (房主)</button>
            <input type="text" id="input-room-code" class="input-box" placeholder="輸入 4 位數房號" maxlength="4">
            <button id="btn-join-room" class="btn">🔗 加入對戰 (挑戰者)</button>
        </div>
        <a href="index.html" id="menu-btn">⬅ 返回大廳</a>
    </div>

    <div id="game-screen">
        <div class="info-board">
            <div class="score-box" id="ui-my-name">我<br><span id="ui-my-score" style="color:#00ffcc;">0</span></div>
            <div class="score-box">回合<br><span id="ui-spins" style="color:white;">0/0</span></div>
            <div class="score-box" id="ui-opp-name">對手<br><span id="ui-opp-score" style="color:#ff0055;">0</span></div>
        </div>
        <div id="room-status">等待加入...</div>
        <div class="machine-container" id="machine-area" style="display:none;">
            <div class="grid-board" id="board">
                <div class="center-control"><button id="spin-btn" disabled>SPIN</button></div>
            </div>
        </div>
    </div>

    <div id="quiz-modal">
        <div class="quiz-box">
            <h3 id="quiz-title" style="margin-top:0; color:#aaa;">最快搶答：</h3>
            <div class="quiz-word" id="quiz-target">APPLE</div>
            <div class="opt-grid" id="quiz-options"></div>
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext; let audioCtx;
        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'tick') { osc.type = 'square'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1); osc.start(now); osc.stop(now + 0.1); } 
            else if (type === 'win') { osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(1000, now + 0.2); gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.5); osc.start(now); osc.stop(now + 0.5); }
        }

        const firebaseConfig = {
            apiKey: "AIzaSyAav_2FeSY7k3QXYYUGfep5UCtKuaApEQM",
            authDomain: "wordgame-pwa.firebaseapp.com",
            databaseURL: "https://wordgame-pwa-default-rtdb.firebaseio.com/", // ⚠️ 貼上您的 Firebase 資料庫網址
            projectId: "wordgame-pwa",
            storageBucket: "wordgame-pwa.firebasestorage.app",
            messagingSenderId: "527450589704",
            appId: "1:527450589704:web:92d700edfc5b6ed1f15fbd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allWords = []; let activePool = []; let myRole = ""; let currentRoom = ""; let localState = ""; let cells = [];
        let singlePlayData = { score: 0, currentSpin: 0, maxRounds: 5, boardWords: [], targetWord: null };

        const ui = {
            lobby: document.getElementById('lobby-screen'), game: document.getElementById('game-screen'),
            board: document.getElementById('board'), spinBtn: document.getElementById('spin-btn'), 
            status: document.getElementById('room-status'), myScore: document.getElementById('ui-my-score'), 
            oppScore: document.getElementById('ui-opp-score'), spins: document.getElementById('ui-spins'),
            modal: document.getElementById('quiz-modal'), qTarget: document.getElementById('quiz-target'), 
            qOpts: document.getElementById('quiz-options'), qTitle: document.getElementById('quiz-title'),
            selMain: document.getElementById('sel-main-level'), selSub: document.getElementById('sel-sub-level')
        };

        // 🌟 連動下拉選單邏輯
        ui.selMain.addEventListener('change', () => {
            const main = ui.selMain.value;
            ui.selSub.innerHTML = '<option value="ALL">📂 所有細項</option>';
            if (main !== "ALL") {
                const subs = [...new Set(allWords.filter(w => w.mainLevel === main).map(w => w.subLevel))].sort();
                subs.forEach(sub => {
                    let opt = document.createElement('option');
                    opt.value = sub;
                    opt.innerText = sub.substring(sub.indexOf(' ') + 1) || sub;
                    ui.selSub.appendChild(opt);
                });
            }
        });

        function getFilteredPool() {
            const main = ui.selMain.value;
            const sub = ui.selSub.value;
            let pool = allWords;
            if (main !== "ALL") pool = pool.filter(w => w.mainLevel === main);
            if (sub !== "ALL") pool = pool.filter(w => w.subLevel === sub);
            return pool;
        }

        async function loadWords() {
            try { const res = await fetch('words.json'); allWords = await res.json();
                document.getElementById('lobby-title').innerText = "選擇遊戲模式";
                document.getElementById('lobby-actions').style.display = "block";
            } catch(e) { alert("無法載入 words.json！"); }
        }

        function renderBoard(boardWords) {
            ui.board.innerHTML = '<div class="center-control"><button id="spin-btn" disabled>SPIN</button></div>';
            ui.spinBtn = document.getElementById('spin-btn'); cells = [];
            for(let i=0; i<12; i++) {
                let cell = document.createElement('div'); cell.className = `cell cell-${i}`; cell.innerText = boardWords[i].en;
                ui.board.appendChild(cell); cells.push(cell);
            }
            cells[0].classList.add('active-light'); document.getElementById('machine-area').style.display = "block";
        }

        document.getElementById('btn-single-play').onclick = () => {
            activePool = getFilteredPool();
            if(activePool.length < 12) return alert("❌ 此分類單字不足 12 個，無法排滿小瑪莉機台！請選擇更大的範圍。");

            myRole = 'single';
            singlePlayData.maxRounds = parseInt(document.getElementById('select-rounds').value);
            singlePlayData.boardWords = [...activePool].sort(() => 0.5 - Math.random()).slice(0, 12);
            
            ui.lobby.classList.remove('active-screen'); ui.game.classList.add('active-screen');
            document.getElementById('ui-opp-name').style.display = "none";
            
            ui.spins.innerText = `0/${singlePlayData.maxRounds}`;
            ui.status.innerText = "單機模式：請按 SPIN 啟動！"; ui.status.style.color = "#8e44ad";
            
            renderBoard(singlePlayData.boardWords);
            ui.spinBtn.disabled = false;
            
            ui.spinBtn.onclick = () => {
                ui.spinBtn.disabled = true; ui.status.innerText = "轉動中...";
                ui.modal.style.display = 'none'; cells.forEach(c => c.classList.remove('jackpot'));

                let targetIdx = Math.floor(Math.random() * 12);
                singlePlayData.targetWord = singlePlayData.boardWords[targetIdx];
                
                let opts = [singlePlayData.targetWord.ch];
                while(opts.length < 4) {
                    let wrong = activePool[Math.floor(Math.random() * activePool.length)].ch;
                    if(!opts.includes(wrong)) opts.push(wrong);
                }
                opts.sort(() => 0.5 - Math.random());

                playSpinAnimation(targetIdx, () => {
                    ui.status.innerText = "請作答！";
                    showLocalQuiz(opts);
                });
            };
        };

        function showLocalQuiz(options) {
            ui.modal.style.display = 'flex'; ui.qTitle.innerText = "請翻譯："; ui.qTarget.innerText = singlePlayData.targetWord.en;
            ui.qOpts.innerHTML = '';
            
            options.forEach(optCh => {
                let btn = document.createElement('button'); btn.className = 'quiz-btn'; btn.innerText = optCh;
                btn.onclick = () => {
                    document.querySelectorAll('.quiz-btn').forEach(b => b.disabled = true);
                    if (optCh === singlePlayData.targetWord.ch) {
                        btn.classList.add('correct'); playSound('win'); singlePlayData.score += 50;
                        ui.qTitle.innerHTML = "🎉 答對了！";
                    } else { btn.classList.add('wrong'); ui.qTitle.innerHTML = "💀 答錯了！"; }
                    ui.myScore.innerText = singlePlayData.score;
                    
                    setTimeout(() => {
                        singlePlayData.currentSpin++; ui.spins.innerText = `${singlePlayData.currentSpin}/${singlePlayData.maxRounds}`;
                        if (singlePlayData.currentSpin >= singlePlayData.maxRounds) {
                            ui.modal.style.display = 'none'; ui.status.innerText = `遊戲結束！得分: ${singlePlayData.score}`;
                        } else { ui.spinBtn.disabled = false; ui.spinBtn.click(); }
                    }, 1500);
                };
                ui.qOpts.appendChild(btn);
            });
        }

        document.getElementById('btn-create-room').onclick = () => {
            activePool = getFilteredPool();
            if(activePool.length < 12) return alert("❌ 此分類單字不足 12 個，無法排滿小瑪莉機台！請選擇更大的範圍。");

            myRole = 'host'; currentRoom = Math.floor(1000 + Math.random() * 9000).toString();
            let pool = [...activePool].sort(() => 0.5 - Math.random()).slice(0, 12);
            let bWords = pool.map(w => ({ ch: w.ch, en: w.en }));
            
            db.ref('rooms/' + currentRoom).set({
                state: 'waiting', maxRounds: parseInt(document.getElementById('select-rounds').value),
                currentRound: 0, hostScore: 0, guestScore: 0, boardWords: bWords,
                targetIndex: -1, winner: "", options: []
            });
            ui.status.innerText = `房號: ${currentRoom} (等待對手加入)`; ui.lobby.classList.remove('active-screen'); ui.game.classList.add('active-screen');
            listenToRoom();
        };

        document.getElementById('btn-join-room').onclick = () => {
            const code = document.getElementById('input-room-code').value;
            if (code.length !== 4) return alert("請輸入 4 位數房號");
            db.ref('rooms/' + code).once('value', snap => {
                if (!snap.exists() || snap.val().state !== 'waiting') return alert("房間不存在或已開始！");
                myRole = 'guest'; currentRoom = code; activePool = getFilteredPool(); // For guest fallback pool
                ui.lobby.classList.remove('active-screen'); ui.game.classList.add('active-screen');
                db.ref('rooms/' + currentRoom).update({ state: 'start_round' }); listenToRoom();
            });
        };

        function listenToRoom() {
            db.ref('rooms/' + currentRoom).on('value', snap => {
                const data = snap.val(); if (!data) return alert("房間已關閉");
                
                if (cells.length === 0 && data.boardWords) renderBoard(data.boardWords);

                ui.myScore.innerText = myRole === 'host' ? data.hostScore : data.guestScore;
                ui.oppScore.innerText = myRole === 'host' ? data.guestScore : data.hostScore;
                ui.spins.innerText = `${data.currentRound}/${data.maxRounds}`;

                if (data.state === 'start_round') {
                    if (myRole === 'host') {
                        ui.spinBtn.disabled = false; ui.status.innerText = "你是房主，請按 SPIN 啟動機台！";
                        ui.spinBtn.onclick = () => {
                            let tidx = Math.floor(Math.random() * 12);
                            let targetWord = data.boardWords[tidx];
                            let opts = [targetWord.ch];
                            while(opts.length < 4 && allWords.length > 4) {
                                let wrong = allWords[Math.floor(Math.random() * allWords.length)].ch;
                                if(!opts.includes(wrong)) opts.push(wrong);
                            }
                            opts.sort(() => 0.5 - Math.random());
                            db.ref('rooms/' + currentRoom).update({ state: 'spinning', targetIndex: tidx, options: opts });
                        };
                    } else { ui.status.innerText = "等待房主按下 SPIN..."; ui.spinBtn.disabled = true; }
                } 
                else if (data.state === 'spinning' && localState !== 'spinning') {
                    localState = 'spinning'; ui.spinBtn.disabled = true; ui.modal.style.display = 'none'; cells.forEach(c => c.classList.remove('jackpot'));
                    ui.status.innerText = "轉動中...";
                    playSpinAnimation(data.targetIndex, () => {
                        if (myRole === 'host') db.ref('rooms/' + currentRoom).update({ state: 'answering', currentRound: data.currentRound + 1 });
                    });
                }
                else if (data.state === 'answering' && localState !== 'answering') {
                    localState = 'answering'; ui.status.innerText = "請作答！";
                    showMultiQuiz(data.options, data.boardWords[data.targetIndex].ch, data.boardWords[data.targetIndex].en);
                }
                else if (data.state === 'round_end' && localState !== 'round_end') {
                    localState = 'round_end'; ui.modal.style.display = 'none';
                    ui.status.innerText = data.winner === myRole ? "🎉 你搶先答對了！" : "💀 被對手搶走了！";
                    if (myRole === 'host') setTimeout(() => { db.ref('rooms/' + currentRoom).update({ state: data.currentRound >= data.maxRounds ? 'game_over' : 'start_round' }); }, 1500);
                }
                else if (data.state === 'game_over') {
                    ui.modal.style.display = 'none'; ui.spinBtn.disabled = true;
                    let myFinal = myRole === 'host' ? data.hostScore : data.guestScore; let oppFinal = myRole === 'host' ? data.guestScore : data.hostScore;
                    if (myFinal > oppFinal) ui.status.innerText = "🔥 恭喜！你是小瑪莉之神！"; else if (myFinal < oppFinal) ui.status.innerText = "😭 挑戰失敗！"; else ui.status.innerText = "🤝 平手！";
                }
            });
        }

        function showMultiQuiz(options, correctCh, targetEn) {
            ui.modal.style.display = 'flex'; ui.qTitle.innerText = "最快搶答："; ui.qTarget.innerText = targetEn; ui.qOpts.innerHTML = '';
            options.forEach(optCh => {
                let btn = document.createElement('button'); btn.className = 'quiz-btn'; btn.innerText = optCh;
                btn.onclick = () => {
                    document.querySelectorAll('.quiz-btn').forEach(b => b.disabled = true);
                    db.ref('rooms/' + currentRoom).transaction(room => {
                        if (room && room.state === 'answering') {
                            if (optCh === correctCh) { room.state = 'round_end'; room.winner = myRole; if (myRole === 'host') room.hostScore += 50; else room.guestScore += 50; } 
                            else { room.state = 'round_end'; room.winner = myRole === 'host' ? 'guest' : 'host'; if (myRole === 'host') room.guestScore += 50; else room.hostScore += 50; }
                        }
                        return room;
                    });
                };
                ui.qOpts.appendChild(btn);
            });
        }

        let currentPos = 0; 
        function playSpinAnimation(targetIdx, callback) {
            if (!audioCtx) audioCtx = new AudioContext();
            let steps = 24; let diff = targetIdx - currentPos; if (diff < 0) diff += 12; steps += diff; 
            let currentStep = 0; let speed = 40;
            function runLight() {
                cells[currentPos].classList.remove('active-light'); currentPos = (currentPos + 1) % 12; cells[currentPos].classList.add('active-light');
                playSound('tick'); currentStep++;
                if (currentStep > steps - 8) speed += 40; 
                if (currentStep < steps) setTimeout(runLight, speed);
                else { cells[currentPos].classList.add('jackpot'); setTimeout(callback, 800); }
            }
            runLight();
        }

        window.onload = loadWords;
    </script>
</body>
</html>
