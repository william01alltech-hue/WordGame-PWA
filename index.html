<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>英文單字遊樂場 Word Arcade</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body {
            background-color: #050505; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; min-height: 100vh;
            
            /* radial-gradient 的寫法修正，符合現代標準 */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(241, 196, 15, 0.08), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(52, 152, 219, 0.08), transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(231, 76, 60, 0.08), transparent 50%);

            /* ✅ 修改：加入防呆點擊 CSS，消除網頁感 */
            -webkit-user-select: none; /* 防止文字反白 */
            user-select: none;
            -webkit-touch-callout: none; /* 防止長按跳出系統選單 */
            touch-action: manipulation; /* 防止雙擊縮放，提升按鈕反應速度 */
        }

        /* 大廳標題霓虹特效 */
        .arcade-title {
            font-size: 38px; font-weight: 900; text-align: center; margin-top: 10px; margin-bottom: 30px;
            color: #fff; text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc, 0 0 40px #00ffcc;
            letter-spacing: 2px; text-transform: uppercase;
        }
        .arcade-title span {
            color: #ff0055; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055, 0 0 40px #ff0055;
        }

        .menu-container {
            display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 400px;
        }

        /* 遊戲選擇卡片 */
        .game-card {
            background: rgba(30, 30, 30, 0.8); border: 2px solid #444; border-radius: 15px;
            padding: 25px 20px; text-align: center; text-decoration: none; color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }

        .game-card h2 { margin: 0 0 10px 0; font-size: 26px; z-index: 2; font-weight: 900;}
        .game-card p { margin: 0; color: #bbb; font-size: 15px; z-index: 2; line-height: 1.4;}
        
        .badge {
            position: absolute; top: 10px; right: -30px; color: white;
            padding: 5px 30px; font-size: 12px; font-weight: bold; transform: rotate(45deg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 3; letter-spacing: 1px;
        }

        /* --- 個別單元專屬主題光效 --- */
        
        /* 0. 單字圖書館 (紫色系) */
        .card-study { border-color: #9b59b6; }
        .card-study:hover { background: #1a0b2e; border-color: #d291bc; box-shadow: 0 0 30px rgba(210, 145, 188, 0.4); transform: scale(1.05) translateY(-5px); }
        .card-study h2 { color: #d291bc; text-shadow: 0 0 15px #d291bc;}
        .card-study .badge { background: #8e44ad; }

        /* 1. 防衛戰 (藍色系) */
        .card-defense { border-color: #3498db; }
        .card-defense:hover { background: #1a252f; border-color: #00ffcc; box-shadow: 0 0 30px rgba(0, 255, 204, 0.4); transform: scale(1.05) translateY(-5px); }
        .card-defense h2 { color: #00ffcc; text-shadow: 0 0 15px #00ffcc;}
        .card-defense .badge { background: #2980b9; }

        /* 2. 骰子對戰 (橙色系) */
        .card-dice { border-color: #e67e22; }
        .card-dice:hover { background: #2d1c0a; border-color: #f39c12; box-shadow: 0 0 30px rgba(243, 156, 18, 0.4); transform: scale(1.05) translateY(-5px); }
        .card-dice h2 { color: #f39c12; text-shadow: 0 0 15px #f39c12;}
        .card-dice .badge { background: #d35400; }

        /* 3. 小瑪莉 (紅色系) */
        .card-slot { border-color: #e74c3c; }
        .card-slot:hover { background: #2c0e0e; border-color: #ff0055; box-shadow: 0 0 30px rgba(255, 0, 85, 0.4); transform: scale(1.05) translateY(-5px); }
        .card-slot h2 { color: #ff0055; text-shadow: 0 0 15px #ff0055;}
        .card-slot .badge { background: #c0392b; }

        /* 底部資訊 */
        .footer-info { margin-top: 40px; color: #666; font-size: 12px; text-align: center; }

    </style>
</head>
<body>

    <div class="arcade-title">單字 <span>遊樂場</span><br><span style="font-size:16px; color:#fff; text-shadow:none; letter-spacing:5px;">WORD ARCADE</span></div>

    <div class="menu-container">
        
        <a href="study_list.html" class="game-card card-study">
            <div class="badge">STUDY</div>
            <h2>📖 單字圖書館</h2>
            <p>A1 ~ C2 程度分級，穩紮穩打<br>內建發音、音標、詞性與實用造句</p>
        </a>

        <a href="game_defense.html" class="game-card card-defense">
            <div class="badge">SOLO</div>
            <h2>🧱 單字防衛戰</h2>
            <p>單機挑戰！消除落下的方塊<br>支援手機點擊與電腦實體鍵盤打字</p>
        </a>

        <a href="game_dice.html" class="game-card card-dice">
            <div class="badge">HOT</div>
            <h2>🎲 骰子連線戰</h2>
            <p>雙人雲端對戰！記憶 6 宮格位置<br>骰子一落，比拼極速反射神經</p>
        </a>

        <a href="game_slot.html" class="game-card card-slot">
            <div class="badge">NEW</div>
            <h2>🎰 幸運小瑪莉</h2>
            <p>雙人同樂！霓虹輪盤全自動連環戰<br>賭上金幣，看誰手速稱霸全場</p>
        </a>

    </div>

    <div class="footer-info">
        1200 單字題庫與發音引擎就緒 | 雙人連線模組正常運行中<br>
        Developed for Junior High School English
    </div>

    <script>
        // PWA Service Worker 註冊 (CACHE_NAME v3 更新會由此啟動)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW 註冊成功！v3 已就緒。'))
                    .catch(err => console.log('SW 註冊失敗', err));
            });
        }
    </script>
</body>
</html>
