<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧱 單字防衛戰</title>
    
    <style>
        /* =========================================
           ★ CSS 變數主題庫 (Theme Engine) ★
           ========================================= */
        :root, body[data-theme="cyberpunk"] {
            --bg-main: #111; --text-main: #00ffcc;
            --title-shadow: 0 0 15px #00ffcc; --title-accent: #ff0055; --title-accent-shadow: 0 0 10px #ff0055;
            --board-bg: #0a0a0a; --board-border: #333; --board-shadow: 0 0 40px rgba(0,255,204,0.1);
            --board-bg-img: linear-gradient(#111 2px, transparent 2px), linear-gradient(90deg, #111 2px, transparent 2px);
            --block-bg: #ff0055; --block-border: #ff4d88;
            --block-bg-resting: #b3003b; --block-border-resting: #80002a; --block-text: white;
            --input-bg: #222; --input-text: #00ffcc; --input-border: #444; --input-focus: #00ffcc;
            --panel-bg: #222; --panel-text: #ddd;
        }

        body[data-theme="arcade"] {
            --bg-main: #2b2b2b; --text-main: #ffe000;
            --title-shadow: 3px 3px 0px #e52521; --title-accent: #e52521; --title-accent-shadow: none;
            --board-bg: #000; --board-border: #ffe000; --board-shadow: 0 0 20px rgba(255,224,0,0.2);
            --board-bg-img: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.05) 2px, rgba(255,255,255,0.05) 4px);
            --block-bg: #e52521; --block-border: #fff;
            --block-bg-resting: #8a1614; --block-border-resting: #aaaaaa; --block-text: white;
            --input-bg: #000; --input-text: #ffe000; --input-border: #ffe000; --input-focus: #e52521;
            --panel-bg: #1a1a1a; --panel-text: #ccc;
        }

        body {
            background-color: var(--bg-main); color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 10px; overflow-x: hidden; transition: 0.3s;
        }
        
        h2 { color: var(--text-main); text-shadow: var(--title-shadow); margin-top:0; margin-bottom: 5px; font-size: 22px; display: flex; justify-content: space-between; width: 100%; max-width: 400px; align-items: center;}
        h2 span.title-text { color: var(--title-accent); text-shadow: var(--title-accent-shadow); }
        .back-btn { background: #555; color: white; padding: 5px 10px; font-size: 12px; border-radius: 5px; text-decoration: none; border: 1px solid #777;}

        /* --- 控制面板 --- */
        #control-panel {
            width: 100%; max-width: 400px; display: flex; flex-wrap: wrap;
            justify-content: space-between; gap: 4px; margin-bottom: 5px; align-items: center; z-index: 100;
        }
        select, button { padding: 6px 4px; font-size: 13px; border-radius: 5px; border: none; outline: none; cursor: pointer; font-weight:bold; }
        select { background-color: var(--input-bg); color: var(--input-text); border: 1px solid var(--input-border); }
        button { background-color: #27ae60; color: white; transition: 0.2s;}
        button:disabled { background-color: #555; cursor: not-allowed; color:#888;}
        
        #input-mode-select { background-color: #3498db; color: white; border: none; width: 100%; padding: 8px;}
        #level-select { background-color: #e67e22; color: white; width: 48%; border:none;}
        #theme-select { width: 48%; }

        .score-board { font-size: 18px; font-weight: 900; color: var(--text-main); width: 100%; text-align: right; text-shadow: var(--title-shadow); margin-top: 2px;}

        /* --- 遊戲掉落區 --- */
        #game-board {
            width: 100%; max-width: 400px; height: 380px; 
            background-color: var(--board-bg); border: 4px solid var(--board-border); 
            border-radius: 10px; position: relative; box-shadow: var(--board-shadow); 
            overflow: hidden; z-index: 1; transition: 0.3s;
            background-image: var(--board-bg-img); background-size: 30px 30px; 
        }
        #game-board.game-over { border-color: red !important; box-shadow: 0 0 100px rgba(255, 0, 0, 0.8) !important; }

        .word-block {
            position: absolute; background-color: var(--block-bg); padding: 6px 12px;
            border-radius: 6px; font-size: 18px; font-weight: 900; color: var(--block-text);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); white-space: nowrap; transform-origin: center center;
            z-index: 10; border: 2px solid var(--block-border); transition: background-color 0.2s, border-color 0.2s;
        }
        .word-block.resting { background-color: var(--block-bg-resting); border-color: var(--block-border-resting); }

        /* --- 輸入與操作區 --- */
        #action-area { width: 100%; max-width: 400px; margin-top: 10px; z-index: 100; min-height: 100px; }
        
        #type-input {
            width: 100%; padding: 12px; font-size: 22px; text-align: center; border: 4px solid var(--input-border);
            border-radius: 8px; box-sizing: border-box; outline: none; transition: all 0.2s;
            font-weight: bold; background-color: var(--input-bg); color: var(--input-text); text-transform: uppercase;
        }
        #type-input:focus { border-color: var(--input-focus); box-shadow: 0 0 20px var(--input-focus); }

        #mc-container { display: none; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; height: 100%; }
        .mc-btn {
            background-color: var(--input-bg); color: var(--input-text);
            border: 2px solid var(--input-border); padding: 12px 5px; font-size: 16px;
            border-radius: 8px; cursor: pointer; word-break: break-word; transition: 0.1s;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .mc-btn:active { transform: scale(0.95); }
        .mc-btn.correct { background-color: #27ae60 !important; color: white !important; border-color: #2ecc71 !important; box-shadow: 0 0 15px #2ecc71;}
        .mc-btn.wrong { background-color: #c0392b !important; color: white !important; border-color: #e74c3c !important; box-shadow: 0 0 15px #e74c3c;}

        /* 特效 */
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: white; z-index: 9999; opacity: 0; pointer-events: none; }
        .flash-active { animation: anim-flash 0.4s ease-out forwards; }
        @keyframes anim-flash { 0% { opacity: 0.9; } 100% { opacity: 0; } }
        .global-shake { animation: anim-global-shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes anim-global-shake { 0%, 100% { transform: translate(0, 0) rotate(0); } 10%, 30%, 50%, 70%, 90% { transform: translate(-15px, 12px) rotate(-2deg); } 20%, 40%, 60%, 80% { transform: translate(15px, -12px) rotate(2deg); } }

        .eff-glow { animation: anim-glow 0.8s forwards; background-color: var(--input-focus) !important; color: var(--bg-main) !important; z-index: 999; border-color: white;}
        @keyframes anim-glow { 40% { transform: scale(4); box-shadow: 0 0 80px 40px var(--input-focus); opacity: 1; } 100% { transform: scale(7); opacity: 0; } }
        .eff-flyup { animation: anim-flyup 0.5s ease-in forwards; background-color: var(--title-accent) !important; z-index: 999; color:var(--block-text);}
        @keyframes anim-flyup { 100% { transform: translateY(-1000px) scale(3) rotate(1080deg); opacity: 0; filter: blur(5px);} }
    </style>
</head>
<body data-theme="cyberpunk">

    <div id="flash-overlay"></div>

    <h2>
        <div>單字防衛戰 <span class="title-text">DEFENSE</span></div>
        <a href="index.html" class="back-btn">⬅ 大廳</a>
    </h2>
    
    <div id="control-panel">
        <select id="input-mode-select">
            <option value="mc" selected>👆 手機專用：選擇題模式</option>
            <option value="typing">⌨️ 電腦專用：鍵盤打字模式</option>
        </select>

        <select id="level-select">
            <option value="1A">國一上 (1A)</option>
            <option value="1B">國一下 (1B)</option>
            <option value="2A">國二上 (2A)</option>
            <option value="2B">國二下 (2B)</option>
            <option value="3A">國三上 (3A)</option>
            <option value="3B">國三下 (3B)</option>
            <option value="ALL">地獄模式 (1200字)</option>
        </select>

        <select id="theme-select">
            <option value="cyberpunk" selected>🎨 賽博</option>
            <option value="arcade">🎨 街機</option>
        </select>

        <button id="start-btn" disabled style="width: 100%; margin-top:5px; padding: 10px; font-size: 16px;">載入單字中...</button>
        <div class="score-board">SCORE: <span id="score-display">0</span></div>
    </div>

    <div id="game-board"></div>
    
    <div id="action-area">
        <input type="text" id="type-input" placeholder="請先點擊開始遊戲" disabled autocomplete="off" style="display: none;">
        <div id="mc-container">
            <button class="mc-btn" disabled>準備中</button>
            <button class="mc-btn" disabled>準備中</button>
            <button class="mc-btn" disabled>準備中</button>
            <button class="mc-btn" disabled>準備中</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 主題切換
        document.getElementById("theme-select").addEventListener("change", (e) => document.body.setAttribute('data-theme', e.target.value));

        // 音效
        function playEffectSound(isCorrect) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            
            if (isCorrect) {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.6);
                gainNode.gain.setValueAtTime(0.8, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(60, now + 0.2);
                gainNode.gain.setValueAtTime(0.8, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        }

        let fetchedWords = []; let activePool = []; let activeBlocks = [];
        let gameInterval, spawnInterval;
        let fallSpeed = 3, isGameOver = false, score = 0;
        let currentInputMode = "mc"; let currentTargetBlock = null;

        const board = document.getElementById("game-board");
        const typeInput = document.getElementById("type-input");
        const mcContainer = document.getElementById("mc-container");
        const startBtn = document.getElementById("start-btn");
        const scoreDisplay = document.getElementById("score-display");
        const inputModeSelect = document.getElementById("input-mode-select");

        inputModeSelect.addEventListener("change", (e) => {
            currentInputMode = e.target.value;
            if (currentInputMode === "typing") {
                typeInput.style.display = "block"; mcContainer.style.display = "none";
            } else {
                typeInput.style.display = "none"; mcContainer.style.display = "grid";
            }
        });

        async function initApp() {
            try {
                const response = await fetch('words.json');
                fetchedWords = await response.json();
                startBtn.textContent = "🚀 開始防衛"; startBtn.disabled = false;
                inputModeSelect.dispatchEvent(new Event('change'));
            } catch (e) {
                startBtn.textContent = "無法載入 words.json";
            }
        }

        startBtn.addEventListener("click", () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const selectedLevel = document.getElementById("level-select").value;
            activePool = selectedLevel === "ALL" ? [...fetchedWords] : fetchedWords.filter(w => w.level === selectedLevel);
            if (activePool.length === 0) { alert("該學期沒有單字！"); return; }

            board.innerHTML = ""; activeBlocks = []; isGameOver = false; score = 0; scoreDisplay.textContent = "0";
            board.classList.remove("game-over"); currentTargetBlock = null; document.body.style.backgroundColor = "";

            startBtn.disabled = true; document.querySelectorAll("select").forEach(s => s.disabled = true);

            if (currentInputMode === "typing") {
                typeInput.disabled = false; typeInput.value = ""; typeInput.focus();
            } else {
                updateMCButtons(null);
            }

            spawnInterval = setInterval(spawnWord, 1800);
            gameInterval = setInterval(updatePhysics, 40);
        });

        function spawnWord() {
            if (isGameOver) return;
            const wordData = activePool[Math.floor(Math.random() * activePool.length)];
            let isCnToEn = Math.random() > 0.5; // 隨機中翻英或英翻中
            
            const blockEl = document.createElement("div");
            blockEl.className = "word-block";
            blockEl.textContent = isCnToEn ? wordData.ch : wordData.en;
            board.appendChild(blockEl);
            
            blockEl.style.left = Math.random() * (board.clientWidth - blockEl.clientWidth - 10) + "px";
            activeBlocks.push({ element: blockEl, y: 0, target: isCnToEn ? wordData.en.toLowerCase() : wordData.ch, isResting: false });
        }

        function updatePhysics() {
            if (isGameOver) return;
            
            activeBlocks.forEach(b => b.isResting = false);
            activeBlocks.sort((a, b) => b.y - a.y);

            for (let i = 0; i < activeBlocks.length; i++) {
                let block = activeBlocks[i];
                let nextY = block.y + fallSpeed;
                let blockBottom = nextY + block.element.offsetHeight;
                let isColliding = false;

                if (blockBottom >= board.clientHeight) {
                    block.y = board.clientHeight - block.element.offsetHeight; isColliding = true;
                } else {
                    for (let j = 0; j < i; j++) {
                        let other = activeBlocks[j];
                        if (!other.isResting) continue;
                        let bLeft = parseFloat(block.element.style.left), bRight = bLeft + block.element.offsetWidth;
                        let oLeft = parseFloat(other.element.style.left), oRight = oLeft + other.element.offsetWidth;
                        if (blockBottom >= other.y && block.y < other.y && bRight > oLeft && bLeft < oRight) {
                            block.y = other.y - block.element.offsetHeight; isColliding = true; break;
                        }
                    }
                }

                if (isColliding) {
                    block.isResting = true; block.element.classList.add("resting");
                    if (block.y <= 0) { triggerGameOver(); return; }
                } else {
                    block.y = nextY; block.element.classList.remove("resting");
                }
                block.element.style.top = block.y + "px";
            }

            if (currentInputMode === "mc" && activeBlocks.length > 0) {
                let lowestBlock = activeBlocks[0];
                if (lowestBlock !== currentTargetBlock) { currentTargetBlock = lowestBlock; updateMCButtons(lowestBlock); }
            } else if (currentInputMode === "mc" && activeBlocks.length === 0) {
                if (currentTargetBlock !== null) { currentTargetBlock = null; updateMCButtons(null); }
            }
        }

        function updateMCButtons(block) {
            const buttons = mcContainer.querySelectorAll(".mc-btn");
            if (!block) { buttons.forEach(btn => { btn.textContent = "等待單字..."; btn.onclick = null; btn.disabled = true; }); return; }

            let correctAnswer = block.target; let options = [correctAnswer];
            let isTargetEnglish = /^[a-zA-Z\s-]+$/.test(correctAnswer);

            while(options.length < 4) {
                let randWord = activePool[Math.floor(Math.random() * activePool.length)];
                let wrongVal = isTargetEnglish ? randWord.en.toLowerCase() : randWord.ch;
                if (!options.includes(wrongVal)) options.push(wrongVal);
            }
            options.sort(() => Math.random() - 0.5);

            buttons.forEach((btn, index) => {
                btn.textContent = options[index]; btn.className = "mc-btn"; btn.disabled = false;
                btn.onclick = () => handleMCClick(options[index], btn, block);
            });
        }

        function handleMCClick(selectedAnswer, btnElement, targetBlock) {
            if (isGameOver || !targetBlock) return;
            if (selectedAnswer === targetBlock.target) {
                btnElement.classList.add("correct");
                const hitIdx = activeBlocks.indexOf(targetBlock);
                if (hitIdx > -1) activeBlocks.splice(hitIdx, 1);
                
                playEffectSound(true);
                targetBlock.element.classList.add(Math.random() > 0.5 ? "eff-glow" : "eff-flyup");
                setTimeout(() => { if (board.contains(targetBlock.element)) targetBlock.element.remove(); }, 600);
                
                score += 10; scoreDisplay.textContent = score;
                currentTargetBlock = null; mcContainer.querySelectorAll(".mc-btn").forEach(b => b.onclick = null);
            } else {
                playEffectSound(false);
                btnElement.classList.add("wrong"); document.body.style.backgroundColor = "#4a0000";
                setTimeout(()=> document.body.style.backgroundColor = "", 150);
                setTimeout(()=> btnElement.classList.remove("wrong"), 300);
            }
        }

        typeInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && currentInputMode === "typing") {
                const val = typeInput.value.trim().toLowerCase();
                let hitIdx = activeBlocks.findIndex(b => b.target.toLowerCase() === val);
                if (hitIdx !== -1) {
                    const b = activeBlocks.splice(hitIdx, 1)[0];
                    playEffectSound(true);
                    b.element.classList.add("eff-glow");
                    setTimeout(() => { if (board.contains(b.element)) b.element.remove(); }, 600);
                    score += 15; scoreDisplay.textContent = score;
                } else {
                    playEffectSound(false);
                    document.body.style.backgroundColor = "#4a0000";
                    setTimeout(()=> document.body.style.backgroundColor = "", 150);
                }
                typeInput.value = "";
            }
        });

        function triggerGameOver() {
            isGameOver = true; clearInterval(gameInterval); clearInterval(spawnInterval);
            board.classList.add("game-over"); document.body.classList.add("global-shake"); document.body.style.backgroundColor = "#8b0000";
            if (currentInputMode === "typing") { typeInput.disabled = true; typeInput.placeholder = "GAME OVER"; } 
            else { mcContainer.querySelectorAll(".mc-btn").forEach(b => { b.disabled = true; b.textContent = "GAME OVER"; b.className="mc-btn"; }); }
            startBtn.disabled = false; startBtn.textContent = "🔄 重新挑戰"; document.querySelectorAll("select").forEach(s => s.disabled = false);
        }

        initApp();
    </script>
</body>
</html>
