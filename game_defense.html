<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧱 單字防衛戰 (精準打擊版)</title>
    
    <style>
        :root, body[data-theme="cyberpunk"] {
            --bg-main: #111; --text-main: #00ffcc; --title-shadow: 0 0 15px #00ffcc; --title-accent: #ff0055; 
            --board-bg: #0a0a0a; --board-border: #333; --board-shadow: 0 0 40px rgba(0,255,204,0.1);
            --board-bg-img: linear-gradient(#111 2px, transparent 2px), linear-gradient(90deg, #111 2px, transparent 2px);
            --block-bg: #ff0055; --block-border: #ff4d88; --block-text: white;
            --input-bg: #222; --input-text: #00ffcc; --input-border: #444; --input-focus: #00ffcc;
        }

        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; overflow-x: hidden; min-height: 100vh;}
        h2 { color: var(--text-main); text-shadow: var(--title-shadow); margin-top:0; margin-bottom: 5px; font-size: 24px; text-align: center; width: 100%;}
        h2 span.title-text { color: var(--title-accent); }

        .container { width: 100%; max-width: 400px; background: #222; padding: 15px; border-radius: 10px; border: 2px solid #444; box-sizing: border-box; text-align: center; margin-bottom: 20px;}
        #lobby-screen, #game-screen { display: none; }
        .active-screen { display: block !important; }
        
        .btn { background: #3498db; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; transition: 0.2s; box-sizing: border-box;}
        .btn:hover:not(:disabled) { filter: brightness(1.2); } .btn:disabled { background: #555; color:#888; cursor:not-allowed;}
        .input-box { width: 100%; padding: 12px; font-size: 16px; text-align: center; border-radius: 5px; border: 2px solid #00ffcc; background: #111; color: white; box-sizing: border-box; margin-bottom: 10px;}
        #menu-btn { background: #555; margin-top: 15px; text-decoration: none; display: inline-block; border: 2px solid #777;}

        #control-panel { width: 100%; max-width: 400px; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 5px; margin-bottom: 5px; z-index: 100; }
        .header-info { width: 100%; display: flex; justify-content: space-between; background: #000; padding: 8px; border-radius: 5px; box-sizing: border-box; font-weight: bold; font-size: 16px;}
        .my-score { color: #00ffcc; } .opp-score { color: #ff0055; }
        #room-status { font-size: 14px; color: #f1c40f; width: 100%; text-align: center; margin-bottom: 5px;}

        #game-board { width: 100%; max-width: 400px; height: 350px; background-color: var(--board-bg); border: 4px solid var(--board-border); border-radius: 10px; position: relative; box-shadow: var(--board-shadow); overflow: hidden; background-image: var(--board-bg-img); background-size: 30px 30px; }
        .word-block { position: absolute; background-color: var(--block-bg); padding: 6px 12px; border-radius: 6px; font-size: 16px; font-weight: 900; color: var(--block-text); box-shadow: 0 4px 10px rgba(0,0,0,0.4); white-space: nowrap; border: 2px solid var(--block-border); z-index: 10;}

        #action-area { width: 100%; max-width: 400px; margin-top: 10px; min-height: 100px; }
        #type-input { width: 100%; padding: 12px; font-size: 22px; text-align: center; border: 4px solid var(--input-border); border-radius: 8px; box-sizing: border-box; outline: none; font-weight: bold; background-color: var(--input-bg); color: var(--input-text); text-transform: uppercase; }
        #type-input:focus { border-color: var(--input-focus); box-shadow: 0 0 15px var(--input-focus); }
        #mc-container { display: none; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .mc-btn { background-color: var(--input-bg); color: var(--input-text); border: 2px solid var(--input-border); padding: 12px 5px; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; text-align: center; }
        .mc-btn:active { transform: scale(0.95); } .mc-btn.correct { background: #27ae60; color: white; border-color: #2ecc71;} .mc-btn.wrong { background: #c0392b; color: white; border-color: #e74c3c;}

        .eff-glow { animation: anim-glow 0.6s forwards; background-color: var(--input-focus) !important; color: #000 !important; z-index: 999; border-color: white;}
        @keyframes anim-glow { 50% { transform: scale(2); box-shadow: 0 0 50px var(--input-focus); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

    <h2>單字防衛戰 <span class="title-text">DEFENSE</span></h2>

    <div id="lobby-screen" class="container active-screen">
        <h3 id="lobby-title">載入題庫中...</h3>
        <div id="lobby-actions" style="display:none; width: 100%;">
            
            <div style="display:flex; gap:5px; margin-bottom:10px; width:100%;">
                <select id="sel-main-level" class="input-box" style="flex:1; background:#e67e22; border:none; color:white; padding:10px; font-size:15px; outline:none;">
                    <option value="ALL">🌟 全冊題庫</option>
                    <option value="1A">國一上 (1A)</option>
                    <option value="1B">國一下 (1B)</option>
                    <option value="2A">國二上 (2A)</option>
                    <option value="2B">國二下 (2B)</option>
                    <option value="3A">國三上 (3A)</option>
                    <option value="3B">國三下 (3B)</option>
                </select>
                <select id="sel-sub-level" class="input-box" style="flex:1; background:#d35400; border:none; color:white; padding:10px; font-size:15px; outline:none;">
                    <option value="ALL">📂 所有細項</option>
                </select>
            </div>
            
            <button id="btn-single-play" class="btn" style="background:#8e44ad;">👤 單機防衛模式 (本機)</button>
            <hr style="border-color:#444; margin: 15px 0;">
            <button id="btn-create-room" class="btn" style="background:#27ae60;">🏠 建立連線戰場 (房主)</button>
            <input type="text" id="input-room-code" class="input-box" placeholder="輸入 4 位數房號" maxlength="4">
            <button id="btn-join-room" class="btn">🔗 加入戰場 (挑戰者)</button>
        </div>
        
        <a href="index.html" id="menu-btn" class="btn">⬅ 返回大廳</a>
    </div>

    <div id="game-screen">
        <div id="control-panel">
            <select id="input-mode-select" class="input-box" style="background:#3498db; border:none; margin-bottom:0;">
                <option value="mc" selected>👆 手機專用：四選一搶答</option>
                <option value="typing">⌨️ 電腦專用：實體鍵盤打字</option>
            </select>
            <div class="header-info">
                <span class="my-score">我: <span id="ui-my-score">0</span></span>
                <span class="opp-score" id="ui-opp-container">對手: <span id="ui-opp-score">0</span></span>
            </div>
            <div id="room-status">等待開始...</div>
        </div>

        <div id="game-board"></div>
        
        <div id="action-area">
            <input type="text" id="type-input" placeholder="請打字輸入..." autocomplete="off">
            <div id="mc-container">
                <button class="mc-btn" disabled>準備中</button>
                <button class="mc-btn" disabled>準備中</button>
                <button class="mc-btn" disabled>準備中</button>
                <button class="mc-btn" disabled>準備中</button>
            </div>
        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext; let audioCtx;
        function playSound(isCorrect) {
            if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            if (isCorrect) { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.4); gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4); } 
            else { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(60, now + 0.2); gain.gain.setValueAtTime(0.5, now); gain.gain.linearRampToValueAtTime(0, now + 0.2); osc.start(now); osc.stop(now + 0.2); }
        }

        const firebaseConfig = {
            apiKey: "AIzaSyAav_2FeSY7k3QXYYUGfep5UCtKuaApEQM",
            authDomain: "wordgame-pwa.firebaseapp.com",
            databaseURL: "https://wordgame-pwa-default-rtdb.firebaseio.com/", // ⚠️ 老前輩記得貼上 URL！
            projectId: "wordgame-pwa",
            storageBucket: "wordgame-pwa.firebasestorage.app",
            messagingSenderId: "527450589704",
            appId: "1:527450589704:web:92d700edfc5b6ed1f15fbd"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allWords = []; let activePool = []; 
        let myRole = ""; let currentRoom = ""; let myScore = 0; let oppScore = 0;
        let isGameOver = false; let fallSpeed = 2;
        let gameInterval, spawnInterval;
        let activeBlocks = {}; 
        let currentInputMode = "mc"; let currentTargetId = null;

        const ui = {
            lobby: document.getElementById('lobby-screen'), game: document.getElementById('game-screen'),
            board: document.getElementById('game-board'), status: document.getElementById('room-status'),
            myScore: document.getElementById('ui-my-score'), oppScore: document.getElementById('ui-opp-score'), oppContainer: document.getElementById('ui-opp-container'),
            typeInput: document.getElementById('type-input'), mcContainer: document.getElementById('mc-container'),
            inputModeSelect: document.getElementById('input-mode-select'),
            selMain: document.getElementById('sel-main-level'), selSub: document.getElementById('sel-sub-level')
        };

        ui.inputModeSelect.addEventListener("change", (e) => {
            currentInputMode = e.target.value;
            if (currentInputMode === "typing") { ui.typeInput.style.display = "block"; ui.mcContainer.style.display = "none"; } 
            else { ui.typeInput.style.display = "none"; ui.mcContainer.style.display = "grid"; }
        });

        ui.selMain.addEventListener('change', () => {
            const main = ui.selMain.value;
            ui.selSub.innerHTML = '<option value="ALL">📂 所有細項</option>';
            if (main !== "ALL") {
                const subs = [...new Set(allWords.filter(w => w.mainLevel === main).map(w => w.subLevel))].sort();
                subs.forEach(sub => {
                    let opt = document.createElement('option');
                    opt.value = sub;
                    opt.innerText = sub.substring(sub.indexOf(' ') + 1) || sub;
                    ui.selSub.appendChild(opt);
                });
            }
        });

        function getFilteredPool() {
            const main = ui.selMain.value;
            const sub = ui.selSub.value;
            let pool = allWords;
            if (main !== "ALL") pool = pool.filter(w => w.mainLevel === main);
            if (sub !== "ALL") pool = pool.filter(w => w.subLevel === sub);
            return pool;
        }

        async function loadWords() {
            try { const res = await fetch('words.json'); allWords = await res.json();
                document.getElementById('lobby-title').innerText = "選擇連線模式"; document.getElementById('lobby-actions').style.display = "block";
                ui.inputModeSelect.dispatchEvent(new Event('change'));
            } catch(e) { alert("無法載入 words.json！"); }
        }

        function startGameLoop() {
            ui.board.innerHTML = ""; activeBlocks = {}; isGameOver = false; myScore = 0; ui.myScore.innerText = 0;
            if (currentInputMode === "typing") { ui.typeInput.disabled = false; ui.typeInput.value = ""; ui.typeInput.focus(); }
            gameInterval = setInterval(updatePhysics, 40);
            if (myRole === 'single' || myRole === 'host') spawnInterval = setInterval(spawnWord, 2000);
        }

        function spawnWord() {
            if (isGameOver || activePool.length === 0) return;
            const wordData = activePool[Math.floor(Math.random() * activePool.length)];
            let isCnToEn = Math.random() > 0.5;
            let targetText = isCnToEn ? wordData.en.toLowerCase() : wordData.ch;
            let displayText = isCnToEn ? wordData.ch : wordData.en;
            let startX = Math.random() * 70; 
            let blockId = "blk_" + Date.now();

            if (myRole === 'single') createBlockOnScreen(blockId, displayText, targetText, startX);
            else if (myRole === 'host') db.ref(`rooms/${currentRoom}/activeWords/${blockId}`).set({ display: displayText, target: targetText, x: startX });
        }

        function createBlockOnScreen(id, displayText, targetText, startX) {
            const blockEl = document.createElement("div");
            blockEl.className = "word-block"; blockEl.textContent = displayText;
            blockEl.style.left = startX + "%"; blockEl.style.top = "0px";
            ui.board.appendChild(blockEl);
            activeBlocks[id] = { element: blockEl, target: targetText, y: 0 };
        }

        function removeBlock(id, isWinner) {
            if (activeBlocks[id]) {
                let el = activeBlocks[id].element;
                if (isWinner) {
                    el.classList.add("eff-glow"); playSound(true);
                    setTimeout(() => { if (ui.board.contains(el)) el.remove(); }, 600);
                } else {
                    if (ui.board.contains(el)) el.remove();
                }
                delete activeBlocks[id];
                if (currentTargetId === id) { currentTargetId = null; updateMCButtons(null); }
            }
        }

        function updatePhysics() {
            if (isGameOver) return;
            let lowestId = null; let lowestY = -1;

            Object.keys(activeBlocks).forEach(id => {
                let block = activeBlocks[id];
                block.y += fallSpeed;
                block.element.style.top = block.y + "px";

                if (block.y > ui.board.clientHeight - 30) {
                    removeBlock(id, false);
                    if (myRole === 'host') db.ref(`rooms/${currentRoom}/activeWords/${id}`).remove();
                } else {
                    if (block.y > lowestY) { lowestY = block.y; lowestId = id; }
                }
            });

            if (currentInputMode === "mc" && lowestId !== currentTargetId) {
                currentTargetId = lowestId; updateMCButtons(lowestId);
            }
        }

        function updateMCButtons(targetId) {
            const buttons = ui.mcContainer.querySelectorAll(".mc-btn");
            if (!targetId || !activeBlocks[targetId]) { buttons.forEach(btn => { btn.textContent = "等待單字..."; btn.onclick = null; btn.disabled = true; }); return; }

            let correctAnswer = activeBlocks[targetId].target; let options = [correctAnswer];
            let isTargetEnglish = /^[a-zA-Z\s-]+$/.test(correctAnswer);

            while(options.length < 4 && activePool.length >= 4) {
                let randWord = activePool[Math.floor(Math.random() * activePool.length)];
                let wrongVal = isTargetEnglish ? randWord.en.toLowerCase() : randWord.ch;
                if (!options.includes(wrongVal)) options.push(wrongVal);
            }
            options.sort(() => Math.random() - 0.5);

            buttons.forEach((btn, index) => {
                if(options[index]) {
                    btn.textContent = options[index]; btn.className = "mc-btn"; btn.disabled = false;
                    btn.onclick = () => handlePlayerAnswer(options[index], btn, targetId);
                }
            });
        }

        ui.typeInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && currentInputMode === "typing") {
                const val = ui.typeInput.value.trim().toLowerCase();
                ui.typeInput.value = "";
                let hitId = Object.keys(activeBlocks).find(id => activeBlocks[id].target.toLowerCase() === val);
                if (hitId) handlePlayerAnswer(val, null, hitId);
                else playSound(false);
            }
        });

        function handlePlayerAnswer(selectedVal, btnElement, targetId) {
            if (isGameOver || !activeBlocks[targetId]) return;
            if (selectedVal === activeBlocks[targetId].target) {
                if (btnElement) btnElement.classList.add("correct");
                if (myRole === 'single') { removeBlock(targetId, true); myScore += 10; ui.myScore.innerText = myScore; } 
                else {
                    db.ref(`rooms/${currentRoom}/activeWords/${targetId}`).transaction(wordData => {
                        if (wordData) { db.ref(`rooms/${currentRoom}/${myRole}Score`).set(firebase.database.ServerValue.increment(10)); return null; }
                        return wordData; 
                    });
                }
            } else {
                playSound(false);
                if (btnElement) { btnElement.classList.add("wrong"); setTimeout(() => btnElement.classList.remove("wrong"), 300); }
            }
        }

        document.getElementById('btn-single-play').onclick = () => {
            activePool = getFilteredPool();
            if (activePool.length === 0) return alert("❌ 此分類目前沒有單字，請重新選擇範圍！");
            myRole = 'single'; ui.oppContainer.style.display = 'none';
            ui.lobby.classList.remove('active-screen'); ui.game.classList.add('active-screen');
            ui.status.innerText = "單機模式運行中"; startGameLoop();
        };

        document.getElementById('btn-create-room').onclick = () => {
            activePool = getFilteredPool();
            if (activePool.length === 0) return alert("❌ 此分類目前沒有單字，請重新選擇範圍！");
            myRole = 'host'; currentRoom = Math.floor(1000 + Math.random() * 9000).toString();
            db.ref('rooms/' + currentRoom).set({ state: 'waiting', hostScore: 0, guestScore: 0 });
            ui.lobby.classList.remove('active-screen'); ui.game.classList.add('active-screen');
            ui.status.innerText = `房號: ${currentRoom} (等待對手)`; listenToRoom();
        };

        document.getElementById('btn-join-room').onclick = () => {
            const code = document.getElementById('input-room-code').value;
            if (code.length !== 4) return alert("請輸入 4 位數房號");
            myRole = 'guest'; currentRoom = code;
            db.ref('rooms/' + currentRoom).once('value', snap => {
                if (!snap.exists()) return alert("房間不存在！");
                ui.lobby.classList.remove('active-screen'); ui.game.classList.add('active-screen');
                db.ref('rooms/' + currentRoom).update({ state: 'playing' }); 
                listenToRoom();
            });
        };

        function listenToRoom() {
            db.ref('rooms/' + currentRoom).on('value', snap => {
                const data = snap.val(); if (!data) return;
                ui.myScore.innerText = myRole === 'host' ? data.hostScore : data.guestScore;
                ui.oppScore.innerText = myRole === 'host' ? data.guestScore : data.hostScore;

                if (data.state === 'playing' && isGameOver === false && !gameInterval) {
                    ui.status.innerText = "🔥 對戰開始！率先 150 分者獲勝"; startGameLoop();
                }

                if (data.hostScore >= 150 || data.guestScore >= 150) {
                    isGameOver = true; clearInterval(gameInterval); clearInterval(spawnInterval);
                    let myFinal = myRole === 'host' ? data.hostScore : data.guestScore;
                    let oppFinal = myRole === 'host' ? data.guestScore : data.hostScore;
                    ui.status.innerText = myFinal > oppFinal ? "🏆 恭喜！你贏得了單字防衛戰！" : "💀 挑戰失敗！對手獲勝！";
                    ui.status.style.color = myFinal > oppFinal ? "#2ecc71" : "#e74c3c";
                    document.querySelectorAll('.mc-btn').forEach(b => b.disabled = true);
                }
            });

            db.ref(`rooms/${currentRoom}/activeWords`).on('child_added', snap => {
                let w = snap.val(); createBlockOnScreen(snap.key, w.display, w.target, w.x);
            });
            db.ref(`rooms/${currentRoom}/activeWords`).on('child_removed', snap => {
                removeBlock(snap.key, true); 
            });
        }
        window.onload = loadWords;
    </script>
</body>
</html>
